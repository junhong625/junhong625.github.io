# Setup
title: Ahn JunHong
description: Hi, welcome
url: https://junhong625.github.io
avatar: <img src="https://user-images.githubusercontent.com/83000975/151135265-4817b237-4043-4bc9-877d-da9230392ab6.jpg">
paginate: 5
permalink: pretty
cover_image: <img src="https://user-images.githubusercontent.com/83000975/151135272-5b88abe3-a160-4c8b-a596-c4efb8435282.jpg">

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec

# Optimize Jekyl SEO Tag
twitter:
  username: JunHong
  card: summary
logo: logo.png
social:
  name: Ahn JunHong
    - https://github.com/junhong625
google_site_verification: xxxxx
lang: en

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
# google_analytics: UA-000000-0

# Replace this value and uncomment to enable Disqus
# disqus: xxxxxx

# Specify the author for blog posts
author:
  name: Ahn JunHong
  url: https://github.com/vszhub/
  email: vszhub@gmail.com
